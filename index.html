<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nákladní doprava – dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <style>
    :root{--bg:#f6f7fb;--card:#fff;--text:#1f2937;--muted:#6b7280;--border:#e5e7eb;--accent:#2563eb}
    *{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:1200px;margin:0 auto;padding:20px} h1{margin:0 0 8px;font-size:30px}
    .sub{color:var(--muted);margin-bottom:18px} .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:16px}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.span2{grid-column:span 2}.span4{grid-column:1/-1}
    label{display:block;font-size:14px;font-weight:700;margin-bottom:6px}
    select,input,button{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;font-size:14px}
    select[multiple]{height:150px} button{background:var(--accent);color:#fff;border:none;cursor:pointer;font-weight:700}
    button.secondary{background:#eef2ff;color:#1e3a8a} .btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    .btns a{display:inline-block;padding:10px 12px;border-radius:10px;text-decoration:none;border:1px solid var(--border);background:#fff;color:var(--text)}
    .table-wrap{overflow:auto;max-height:420px;border:1px solid var(--border);border-radius:10px}
    table{width:100%;border-collapse:collapse;font-size:13px} th,td{padding:8px 10px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap}
    th{position:sticky;top:0;background:#f9fafb}.note{font-size:13px;color:var(--muted)}
    @media (max-width:900px){.grid{grid-template-columns:1fr 1fr}.span2,.span4{grid-column:auto}}
    @media (max-width:600px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="wrap">
  <h1>Nákladní doprava – dashboard</h1>
  <div class="sub">Jednoduchá verze pro GitHub Pages. Stačí kliknout na „Načíst data“.</div>

  <div class="card">
    <div class="grid">
      <div class="span4">
        <label for="dataUrl">CSV adresa</label>
        <input id="dataUrl" value="https://data.csu.gov.cz/api/dotaz/v1/data/vybery/uzivatelske/5acca73e-6932-40b5-96f8-f4aa56e24dec?format=CSV" />
      </div>
      <div>
        <label for="yearFrom">Rok od</label>
        <select id="yearFrom"></select>
      </div>
      <div>
        <label for="yearTo">Rok do</label>
        <select id="yearTo"></select>
      </div>
      <div>
        <label for="metric">Ukazatel</label>
        <select id="metric"></select>
      </div>
      <div>
        <label for="transport">Druh dopravy</label>
        <select id="transport" multiple></select>
      </div>
      <div class="span2">
        <label for="goods">Členění</label>
        <select id="goods" multiple></select>
      </div>
    </div>
    <div class="btns">
      <button id="loadBtn">Načíst data</button>
      <button id="exportBtn" class="secondary" type="button">Export filtrovaného CSV</button>
      <a href="https://data.csu.gov.cz/datastat/data/VYBER/DOP04BT1?vSel=1" target="_blank">Otevřít DataStat</a>
    </div>
    <p class="note" id="status">Připraveno.</p>
  </div>

  <div class="card"><canvas id="chart" height="110"></canvas></div>
  <div class="card"><div class="table-wrap"><table id="dataTable"><thead></thead><tbody></tbody></table></div></div>
</div>

<script>
let rawRows = [], filteredRows = [], chart;

const els = {
  dataUrl: document.getElementById('dataUrl'),
  yearFrom: document.getElementById('yearFrom'),
  yearTo: document.getElementById('yearTo'),
  metric: document.getElementById('metric'),
  transport: document.getElementById('transport'),
  goods: document.getElementById('goods'),
  status: document.getElementById('status'),
  loadBtn: document.getElementById('loadBtn'),
  exportBtn: document.getElementById('exportBtn'),
  table: document.getElementById('dataTable'),
};

const KNOWN_TRANSPORTS = [
  'Nákladní doprava celkem',
  'Železniční doprava',
  'Silniční doprava',
  'Letecká doprava',
  'Vnitrozemská vodní doprava',
  'Potrubní přeprava ropy',
  'Potrubní přeprava zemního plynu',
  'Potrubní doprava'
];

function normalize(str){
  return String(str ?? '').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/\s+/g,' ').trim();
}
function toNumber(val){
  const s = String(val ?? '').trim().replace(/\u00A0/g,' ').replace(/\s/g,'').replace(',', '.');
  const n = Number(s);
  return Number.isFinite(n) ? n : null;
}
function populateSelect(select, values, multiple=false, includeAll=true){
  select.innerHTML = '';
  if(includeAll && !multiple){
    const opt = document.createElement('option');
    opt.value = '__ALL__';
    opt.textContent = 'Vše';
    select.appendChild(opt);
  }
  values.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v;
    opt.textContent = v;
    if(multiple) opt.selected = true;
    select.appendChild(opt);
  });
}
function selectedValues(select){
  return Array.from(select.selectedOptions).map(o => o.value).filter(v => v !== '__ALL__');
}

function parseCombinedLabel(label){
  const cleaned = String(label || '').replace(/^"+|"+$/g, '');
  const parts = cleaned.split(',').map(s => s.trim()).filter(Boolean);

  const metric = parts[0] || '';
  const year = parts.find(p => /^\d{4}$/.test(p)) || '';
  const transport = parts.find(p =>
    KNOWN_TRANSPORTS.some(t => normalize(t) === normalize(p))
  ) || 'Neuvedeno';

  const unitMatch = metric.match(/\(([^)]+)\)/);
  const unit = unitMatch ? unitMatch[1] : '';

  const extras = parts.filter(p =>
    p !== metric &&
    p !== year &&
    p !== transport &&
    normalize(p) !== 'cesko'
  );

  let goods = extras.join(' – ');
  if(!goods) goods = 'Celkem';

  return { metric, year, transport, unit, goods };
}

function fillFilters(){
  const years = [...new Set(rawRows.map(r => r.year).filter(v => /^\d{4}$/.test(String(v))))].sort();
  const metrics = [...new Set(rawRows.map(r => r.metric).filter(Boolean))].sort();
  const transports = [...new Set(rawRows.map(r => r.transport).filter(Boolean))].sort();
  const goods = [...new Set(rawRows.map(r => r.goods).filter(Boolean))].sort();

  populateSelect(els.yearFrom, years, false, false);
  populateSelect(els.yearTo, years, false, false);
  populateSelect(els.metric, metrics, false, true);
  populateSelect(els.transport, transports, true, false);
  populateSelect(els.goods, goods, true, false);

  if(years.length){
    els.yearFrom.value = years[0];
    els.yearTo.value = years[years.length - 1];
  }
}

function applyFilters(){
  const yearFrom = Number(els.yearFrom.value || 0);
  const yearTo = Number(els.yearTo.value || 9999);
  const metric = els.metric.value;
  const transports = selectedValues(els.transport);
  const goods = selectedValues(els.goods);

  filteredRows = rawRows.filter(r => {
    const y = Number(r.year);
    if(Number.isFinite(y) && (y < yearFrom || y > yearTo)) return false;
    if(metric && metric !== '__ALL__' && r.metric !== metric) return false;
    if(transports.length && !transports.includes(r.transport)) return false;
    if(goods.length && !goods.includes(r.goods)) return false;
    return true;
  });

  renderChart();
  renderTable();
  els.status.textContent = `Zobrazeno ${filteredRows.length} řádků.`;
}

function renderChart(){
  const years = [...new Set(filteredRows.map(r => r.year).filter(Boolean))].sort();
  const byTransport = {};

  filteredRows.forEach(r => {
    const key = r.transport;
    if(!byTransport[key]) byTransport[key] = {};
    byTransport[key][r.year] = r.valueNum ?? 0;
  });

  const datasets = Object.entries(byTransport).map(([label, vals]) => ({
    label,
    data: years.map(y => vals[y] ?? null),
    tension: 0.2
  }));

  if(chart) chart.destroy();
  chart = new Chart(document.getElementById('chart'), {
    type: 'line',
    data: { labels: years, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: { legend: { position: 'bottom' } },
      interaction: { mode: 'nearest', intersect: false },
      scales: { y: { beginAtZero: false } }
    }
  });
}

function renderTable(){
  const cols = ['year','transport','goods','metric','unit','value'];
  const names = { year:'Rok', transport:'Druh dopravy', goods:'Členění', metric:'Ukazatel', unit:'Jednotka', value:'Hodnota' };
  els.table.querySelector('thead').innerHTML = `<tr>${cols.map(c => `<th>${names[c]}</th>`).join('')}</tr>`;
  els.table.querySelector('tbody').innerHTML = filteredRows.slice(0,1000).map(r => `
    <tr>
      <td>${r.year}</td>
      <td>${r.transport}</td>
      <td>${r.goods}</td>
      <td>${r.metric}</td>
      <td>${r.unit}</td>
      <td>${r.value}</td>
    </tr>
  `).join('');
}

function exportCsv(){
  if(!filteredRows.length) return;
  const header = ['Rok','Druh dopravy','Členění','Ukazatel','Jednotka','Hodnota'];
  const lines = [header.join(';')];
  filteredRows.forEach(r => {
    lines.push([r.year,r.transport,r.goods,r.metric,r.unit,r.value].map(v => `"${String(v ?? '').replace(/"/g,'""')}"`).join(';'));
  });
  const blob = new Blob(["\ufeff" + lines.join('\n')], {type: 'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'dopravni_dashboard_export.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

async function loadData(){
  try{
    els.status.textContent = 'Načítám data...';
    const res = await fetch(els.dataUrl.value.trim());
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();

    const parsed = Papa.parse(text, {
      delimiter: ';',
      skipEmptyLines: true,
      quoteChar: '"'
    });

    const rows = parsed.data;
    if(!rows || rows.length < 2) throw new Error('CSV je prázdné.');

    const dataRows = rows.slice(1); // přeskočí hlavičku

    rawRows = dataRows.map(row => {
      const label = row[0] || '';
      const valueRaw = row[1] || '';
      const p = parseCombinedLabel(label);
      return {
        year: p.year,
        transport: p.transport,
        goods: p.goods,
        metric: p.metric,
        unit: p.unit,
        value: valueRaw,
        valueNum: toNumber(valueRaw)
      };
    }).filter(r => r.year || r.transport || r.metric);

    fillFilters();
    applyFilters();
    els.status.textContent = `Data načtena. Celkem ${rawRows.length} řádků.`;
  } catch (err){
    els.status.textContent = 'Nepodařilo se načíst data: ' + err.message;
  }
}

els.loadBtn.addEventListener('click', loadData);
els.exportBtn.addEventListener('click', exportCsv);
['change','input'].forEach(evt => {
  els.yearFrom.addEventListener(evt, applyFilters);
  els.yearTo.addEventListener(evt, applyFilters);
  els.metric.addEventListener(evt, applyFilters);
  els.transport.addEventListener(evt, applyFilters);
  els.goods.addEventListener(evt, applyFilters);
});
</script>
</body>
</html>

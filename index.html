<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panorama dopravy ČR</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #0056b3; --bg: #f8f9fa; --text: #333; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 0; }
        header { background: white; padding: 20px; border-bottom: 1px solid #ddd; text-align: center; }
        .container { max-width: 1200px; margin: 20px auto; padding: 0 20px; }
        .card { background: white; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); padding: 25px; margin-bottom: 20px; }
        .loader { font-style: italic; color: #666; text-align: center; padding: 50px; }
        h1 { margin: 0; color: var(--primary); font-size: 24px; }
        .footer { text-align: center; font-size: 12px; color: #999; margin-top: 40px; padding-bottom: 20px; }
    </style>
</head>
<body>

<header>
    <h1>📊 Panorama osobní dopravy ČR</h1>
    <p>Interaktivní přehled založený na otevřených datech ČSÚ</p>
</header>

<div class="container">
    <div id="loader" class="loader">Načítám aktuální data z DataStat ČSÚ...</div>
    
    <div class="card" id="main-card" style="display:none;">
        <div id="graph-title" style="font-weight:bold; margin-bottom:15px; font-size:18px;">Vývoj přepravních výkonů</div>
        <div id="myGraph"></div>
    </div>

    <div class="footer">
        Zdroj dat: Český statistický úřad | Vytvořeno pomocí Plotly.js
    </div>
</div>

<script>
    // TVŮJ ODKAZ NA CSV Z DATASTATU
    const CSV_URL = 'https://data.csu.gov.cz/api/dotaz/v1/data/vybery/DOP01T1?format=CSV';

    Papa.parse(CSV_URL, {
        download: true,
        header: true,
        dynamicTyping: true,
        skipEmptyLines: true,
        complete: function(results) {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('main-card').style.display = 'block';

            const rawData = results.data;

            // Zpracování dat (ČSÚ CSV má obvykle sloupce 'casobd_txt' pro čas a 'hodnota' pro čísla)
            // Pokud se sloupce jmenují jinak, upravte názvy v hranatých závorkách níže:
            const xData = rawData.map(d => d['casobd_txt'] || d[Object.keys(d)[0]]);
            const yData = rawData.map(d => d['hodnota']);

            const trace = {
                x: xData,
                y: yData,
                type: 'scatter',
                mode: 'lines+markers',
                line: { color: '#0056b3', width: 3 },
                marker: { size: 7, color: '#0056b3' },
                fill: 'tozeroy',
                fillcolor: 'rgba(0, 86, 179, 0.1)',
                name: 'Osobní doprava'
            };

            const layout = {
                autosize: true,
                height: 500,
                margin: { l: 50, r: 30, t: 20, b: 50 },
                hovermode: 'x unified',
                xaxis: { gridcolor: '#eee', zeroline: false },
                yaxis: { gridcolor: '#eee', title: 'Počet (tis. os.-km)' }
            };

            const config = { responsive: true, displayModeBar: false };

            Plotly.newPlot('myGraph', [trace], layout, config);
        },
        error: function(err) {
            document.getElementById('loader').innerHTML = "⚠️ Nepodařilo se načíst data. Zkontrolujte API připojení k ČSÚ.";
        }
    });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nákladní doprava – jednoduchý dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root{
      --bg:#f6f7fb; --card:#ffffff; --text:#1f2937; --muted:#6b7280; --border:#e5e7eb; --accent:#2563eb;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
    .wrap{max-width:1200px;margin:0 auto;padding:20px}
    h1{margin:0 0 8px 0;font-size:30px}
    .sub{color:var(--muted);margin-bottom:18px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:16px}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
    .span2{grid-column:span 2}
    .span4{grid-column:1 / -1}
    label{display:block;font-size:14px;font-weight:700;margin-bottom:6px}
    select,input,button{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;font-size:14px}
    select[multiple]{height:150px}
    button{background:var(--accent);color:white;border:none;cursor:pointer;font-weight:700}
    button.secondary{background:#eef2ff;color:#1e3a8a}
    .btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px}
    .btns a{display:inline-block;padding:10px 12px;border-radius:10px;text-decoration:none;border:1px solid var(--border);background:white;color:var(--text)}
    .table-wrap{overflow:auto;max-height:420px;border:1px solid var(--border);border-radius:10px}
    table{width:100%;border-collapse:collapse;font-size:13px}
    th,td{padding:8px 10px;border-bottom:1px solid var(--border);text-align:left;white-space:nowrap}
    th{position:sticky;top:0;background:#f9fafb}
    .note{font-size:13px;color:var(--muted)}
    @media (max-width: 900px){.grid{grid-template-columns:1fr 1fr}.span2,.span4{grid-column:auto}}
    @media (max-width: 600px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Nákladní doprava – jednoduchý dashboard</h1>
    <div class="sub">Verze upravená pro export z ČSÚ, kde jsou dimenze často sloučené do jednoho textového pole.</div>

    <div class="card">
      <div class="grid">
        <div class="span4">
          <label for="dataUrl">CSV adresa</label>
          <input id="dataUrl" value="https://data.csu.gov.cz/api/dotaz/v1/data/vybery/uzivatelske/5acca73e-6932-40b5-96f8-f4aa56e24dec?format=CSV" />
        </div>
        <div>
          <label for="yearFrom">Rok od</label>
          <select id="yearFrom"></select>
        </div>
        <div>
          <label for="yearTo">Rok do</label>
          <select id="yearTo"></select>
        </div>
        <div>
          <label for="metric">Ukazatel</label>
          <select id="metric"></select>
        </div>
        <div>
          <label for="transport">Druh dopravy</label>
          <select id="transport" multiple></select>
        </div>
        <div class="span2">
          <label for="goods">Přepravované věci / další členění</label>
          <select id="goods" multiple></select>
        </div>
      </div>
      <div class="btns">
        <button id="loadBtn">Načíst data</button>
        <button id="exportBtn" class="secondary" type="button">Export filtrovaného CSV</button>
        <a href="https://data.csu.gov.cz/datastat/data/VYBER/DOP04BT1?vSel=1" target="_blank">Otevřít DataStat</a>
      </div>
      <p class="note" id="status">Připraveno.</p>
    </div>

    <div class="card">
      <canvas id="chart" height="110"></canvas>
    </div>

    <div class="card">
      <div class="table-wrap">
        <table id="dataTable">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </div>

<script>
let rawRows = [];
let filteredRows = [];
let chart;

const els = {
  dataUrl: document.getElementById('dataUrl'),
  yearFrom: document.getElementById('yearFrom'),
  yearTo: document.getElementById('yearTo'),
  metric: document.getElementById('metric'),
  transport: document.getElementById('transport'),
  goods: document.getElementById('goods'),
  status: document.getElementById('status'),
  loadBtn: document.getElementById('loadBtn'),
  exportBtn: document.getElementById('exportBtn'),
  table: document.getElementById('dataTable'),
};

const KNOWN_TRANSPORTS = [
  'Nákladní doprava celkem',
  'Železniční doprava',
  'Silniční doprava',
  'Letecká doprava',
  'Vnitrozemská vodní doprava',
  'Potrubní přeprava ropy',
  'Potrubní přeprava zemního plynu',
  'Potrubní doprava'
];

function normalize(str){
  return String(str ?? '')
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
    .toLowerCase().replace(/\s+/g,' ').trim();
}

function parseCsv(text){
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for(let i=0;i<text.length;i++){
    const c = text[i];
    const next = text[i+1];
    if(c === '"'){
      if(inQuotes && next === '"'){ field += '"'; i++; }
      else inQuotes = !inQuotes;
    } else if(c === ';' && !inQuotes){
      row.push(field); field = '';
    } else if((c === '\n' || c === '\r') && !inQuotes){
      if(c === '\r' && next === '\n') i++;
      row.push(field);
      if(row.some(v => String(v).trim().length)) rows.push(row);
      row = []; field = '';
    } else {
      field += c;
    }
  }
  if(field.length || row.length){
    row.push(field);
    rows.push(row);
  }
  return rows;
}

function populateSelect(select, values, multiple=false, includeAll=true){
  select.innerHTML = '';
  if(includeAll && !multiple){
    const opt = document.createElement('option');
    opt.value = '__ALL__';
    opt.textContent = 'Vše';
    select.appendChild(opt);
  }
  values.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v;
    opt.textContent = v;
    if(multiple) opt.selected = true;
    select.appendChild(opt);
  });
}

function selectedValues(select){
  return Array.from(select.selectedOptions).map(o => o.value).filter(v => v !== '__ALL__');
}

function toNumber(val){
  const s = String(val ?? '').replace(/\s/g,'').replace(',', '.');
  const n = Number(s);
  return Number.isFinite(n) ? n : null;
}

function detectNumericColumn(headers, dataRows){
  const scores = headers.map((h, idx) => {
    let ok = 0, total = 0;
    for(let i = 0; i < Math.min(50, dataRows.length); i++){
      const cell = dataRows[i][idx];
      if(String(cell ?? '').trim() === '') continue;
      total++;
      if(toNumber(cell) !== null) ok++;
    }
    return { header: h, idx, score: total ? ok / total : 0 };
  });
  scores.sort((a, b) => b.score - a.score);
  return scores[0] && scores[0].score > 0.6 ? scores[0].header : headers[headers.length - 1];
}

function detectLabelColumn(headers, dataRows, valueHeader){
  const idxValue = headers.indexOf(valueHeader);
  const candidates = headers.filter((_, idx) => idx !== idxValue);
  candidates.sort((a, b) => {
    const ai = headers.indexOf(a), bi = headers.indexOf(b);
    const aSample = dataRows.find(r => String(r[ai] ?? '').trim())?.[ai] || '';
    const bSample = dataRows.find(r => String(r[bi] ?? '').trim())?.[bi] || '';
    return String(bSample).length - String(aSample).length;
  });
  return candidates[0] || headers[0];
}

function parseCombinedLabel(label){
  const parts = String(label || '')
    .split(',')
    .map(s => s.trim())
    .filter(Boolean);

  const yearIndex = parts.findIndex(p => /^\d{4}$/.test(p));
  const year = yearIndex >= 0 ? parts[yearIndex] : '';

  const transport = parts.find(p => KNOWN_TRANSPORTS.some(t => normalize(t) === normalize(p))) || '';

  const indicator = parts[0] || '';
  const unitMatch = indicator.match(/\(([^)]+)\)/);
  const unit = unitMatch ? unitMatch[1] : '';

  const skip = new Set([indicator, transport, year, 'Česko', 'Cesko']);
  const extras = parts.filter(p => !skip.has(p) && !/^\d{4}$/.test(p) && normalize(p) !== 'cesko');

  let goods = extras.join(' – ');
  if(!goods && parts.length === 4) goods = 'Celkem';
  if(!goods && parts.length > 4) goods = extras[0] || 'Celkem';

  return { indicator, unit, year, transport, goods, rawLabel: label };
}

function fillFilters(){
  const years = [...new Set(rawRows.map(r => r.year).filter(v => /^\d{4}$/.test(String(v))))].sort();
  const metrics = [...new Set(rawRows.map(r => r.metric).filter(Boolean))].sort();
  const transports = [...new Set(rawRows.map(r => r.transport).filter(Boolean))].sort();
  const goods = [...new Set(rawRows.map(r => r.goods).filter(Boolean))].sort();

  populateSelect(els.yearFrom, years, false, false);
  populateSelect(els.yearTo, years, false, false);
  populateSelect(els.metric, metrics, false, true);
  populateSelect(els.transport, transports, true, false);
  populateSelect(els.goods, goods, true, false);

  if(years.length){
    els.yearFrom.value = years[0];
    els.yearTo.value = years[years.length - 1];
  }
}

function applyFilters(){
  const yearFrom = Number(els.yearFrom.value || 0);
  const yearTo = Number(els.yearTo.value || 9999);
  const metric = els.metric.value;
  const transports = selectedValues(els.transport);
  const goods = selectedValues(els.goods);

  filteredRows = rawRows.filter(r => {
    const y = Number(r.year);
    if(Number.isFinite(y) && (y < yearFrom || y > yearTo)) return false;
    if(metric && metric !== '__ALL__' && r.metric !== metric) return false;
    if(transports.length && !transports.includes(r.transport)) return false;
    if(goods.length && !goods.includes(r.goods)) return false;
    return true;
  });

  renderChart();
  renderTable();
  els.status.textContent = `Zobrazeno ${filteredRows.length} řádků.`;
}

function renderChart(){
  const grouped = {};
  filteredRows.forEach(r => {
    const label = r.transport || r.goods || 'Neuvedeno';
    const year = String(r.year || '');
    const val = r.valueNum ?? 0;
    if(!grouped[label]) grouped[label] = {};
    grouped[label][year] = (grouped[label][year] || 0) + val;
  });

  const years = [...new Set(filteredRows.map(r => String(r.year)).filter(v => /^\d{4}$/.test(v)))].sort();
  const datasets = Object.entries(grouped).slice(0, 12).map(([label, vals]) => ({
    label,
    data: years.map(y => vals[y] || 0),
    tension: 0.2
  }));

  if(chart) chart.destroy();
  chart = new Chart(document.getElementById('chart'), {
    type: 'line',
    data: { labels: years, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: true,
      plugins: { legend: { position: 'bottom' } },
      interaction: { mode: 'nearest', intersect: false },
      scales: { y: { beginAtZero: false } }
    }
  });
}

function renderTable(){
  const thead = els.table.querySelector('thead');
  const tbody = els.table.querySelector('tbody');
  const cols = ['year','transport','goods','metric','unit','value'];
  const names = {
    year:'Rok', transport:'Druh dopravy', goods:'Členění',
    metric:'Ukazatel', unit:'Jednotka', value:'Hodnota'
  };

  thead.innerHTML = `<tr>${cols.map(c => `<th>${names[c]}</th>`).join('')}</tr>`;
  tbody.innerHTML = filteredRows.slice(0, 1000).map(r => `
    <tr>
      <td>${r.year ?? ''}</td>
      <td>${r.transport ?? ''}</td>
      <td>${r.goods ?? ''}</td>
      <td>${r.metric ?? ''}</td>
      <td>${r.unit ?? ''}</td>
      <td>${r.value ?? ''}</td>
    </tr>
  `).join('');
}

function exportCsv(){
  if(!filteredRows.length) return;
  const header = ['Rok','Druh dopravy','Členění','Ukazatel','Jednotka','Hodnota'];
  const lines = [header.join(';')];
  filteredRows.forEach(r => {
    const row = [r.year, r.transport, r.goods, r.metric, r.unit, r.value]
      .map(v => `"${String(v ?? '').replace(/"/g,'""')}"`);
    lines.push(row.join(';'));
  });
  const blob = new Blob(["\ufeff" + lines.join('\n')], {type: 'text/csv;charset=utf-8;'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'dopravni_dashboard_export.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

async function loadData(){
  try{
    els.status.textContent = 'Načítám data...';
    const res = await fetch(els.dataUrl.value.trim());
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const text = await res.text();
    const rows = parseCsv(text);
    if(rows.length < 2) throw new Error('CSV je prázdné.');

    const headers = rows[0].map(h => h.trim());
    const dataRows = rows.slice(1);

    const valueHeader = detectNumericColumn(headers, dataRows);
    const labelHeader = detectLabelColumn(headers, dataRows, valueHeader);
    const idxLabel = headers.indexOf(labelHeader);
    const idxValue = headers.indexOf(valueHeader);

    rawRows = dataRows.map(row => {
      const label = row[idxLabel] || '';
      const value = row[idxValue] || '';
      const parsed = parseCombinedLabel(label);
      return {
        year: parsed.year,
        transport: parsed.transport || 'Neuvedeno',
        goods: parsed.goods || 'Celkem',
        metric: parsed.indicator || 'Neuvedeno',
        unit: parsed.unit || '',
        value: value,
        valueNum: toNumber(value),
        rawLabel: parsed.rawLabel
      };
    }).filter(r => r.metric || r.value || r.year);

    fillFilters();
    applyFilters();
    els.status.textContent = `Data načtena. Celkem ${rawRows.length} řádků.`;
  }catch(err){
    els.status.textContent = 'Nepodařilo se načíst data: ' + err.message;
  }
}

els.loadBtn.addEventListener('click', loadData);
els.exportBtn.addEventListener('click', exportCsv);
['change','input'].forEach(evt => {
  els.yearFrom.addEventListener(evt, applyFilters);
  els.yearTo.addEventListener(evt, applyFilters);
  els.metric.addEventListener(evt, applyFilters);
  els.transport.addEventListener(evt, applyFilters);
  els.goods.addEventListener(evt, applyFilters);
});
</script>
</body>
</html>
